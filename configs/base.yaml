
# Base Configuration for DINOv2 Training
# This configuration file sets up the base parameters for training DINOv2 models.

data_root: "Dataset"
image_size: [560, 560] # H, W
num_classes: 8

train_batch_size: 8
val_batch_size: 8
num_epochs: 1
learning_rate: 0.00005 # Initial learning rate
weight_decay: 0.0001
num_workers: 4 # Number of data loading workers
 
# ImageNet Normalization (standard for pre-trained backbones)
normalize_mean: [0.485, 0.456, 0.406]
normalize_std: [0.229, 0.224, 0.225]

# Path to save trained models
save_dir: "models/trained_models"